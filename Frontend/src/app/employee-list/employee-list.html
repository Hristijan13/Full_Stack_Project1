<div id="kopceVraboteni">
  <button matButton="elevated" class="mt-2" routerLink="/employee">Go to form</button>
</div>

<table id="tabela" mat-table [dataSource]="dataSource" class="mat-elevation-z8 mt-6">
  <ng-container matColumnDef="employeeId">
    <th mat-header-cell *matHeaderCellDef>Employee Id</th>
    <td mat-cell *matCellDef="let element">{{ element.employeeId }}</td>
  </ng-container>

  <ng-container matColumnDef="employeeName">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let element">{{ element.employeeName }}</td>
  </ng-container>

  <ng-container matColumnDef="employeeContactNumber">
    <th mat-header-cell *matHeaderCellDef>Contact Number</th>
    <td mat-cell *matCellDef="let element">{{ element.employeeContactNumber }}</td>
  </ng-container>

  <ng-container matColumnDef="emmployeeAdress">
    <th mat-header-cell *matHeaderCellDef>Address</th>
    <td mat-cell *matCellDef="let element">{{ element.emmployeeAdress }}</td>
  </ng-container>

  <ng-container matColumnDef="employeeGender">
    <th mat-header-cell *matHeaderCellDef>Gender</th>
    <td mat-cell *matCellDef="let element">{{ element.employeeGender }}</td>
  </ng-container>
  <ng-container matColumnDef="employeeDepartment">
    <th mat-header-cell *matHeaderCellDef>Department</th>
    <td mat-cell *matCellDef="let element">{{ element.employeeDepartment }}</td>
  </ng-container>
  <ng-container matColumnDef="employeeSkills">
    <th mat-header-cell *matHeaderCellDef>Skills</th>
    <td mat-cell *matCellDef="let element">{{ element.employeeSkills }}</td>
  </ng-container>
  <ng-container matColumnDef="delete">
    <th mat-header-cell *matHeaderCellDef>Delete</th>
    <td mat-cell *matCellDef="let element">
      <button
        mat-icon-button
        color="warn"
        aria-label="Example icon button with a delete icon"
        (click)="deleteEmployee(element.employeeId)"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>
  <ng-container matColumnDef="edit">
    <th mat-header-cell *matHeaderCellDef>Edit</th>
    <td mat-cell *matCellDef="let element">
      <button
        mat-icon-button
        color="warn"
        aria-label="Example icon button with a edit icon"
        (click)="updateEmployee(element.employeeId)"
      >
        <mat-icon>edit</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
