<div class="container">
  <div align="right">
    <button matButton="elevated" class="mt-2" routerLink="/employee-list">
      Go to employee list
    </button>
  </div>
  <div class="card p-5 mt-2">
    <form #employeeForm="ngForm" (ngSubmit)="saveEmployee(employeeForm)">
      <mat-form-field appearance="outline">
        <mat-label>Employee Id</mat-label>
        <input
          matInput
          placeholder="EmployeeId"
          name="employeeId"
          [(ngModel)]="employee.employeeId"
          disabled
        />
        <mat-icon matSuffix>sentiment_very_satisfied</mat-icon>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Employee Name</mat-label>
        <input
          matInput
          placeholder="Employee Name"
          name="employeeName"
          [(ngModel)]="employee.employeeName"
        />
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Contact Number</mat-label>
        <input
          matInput
          placeholder="Contact Number"
          name="employeeContactNumber"
          [(ngModel)]="employee.employeeContactNumber"
        />
        <mat-icon matSuffix>call</mat-icon>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Address</mat-label>
        <input
          matInput
          placeholder="Address"
          name="emmployeeAdress"
          [(ngModel)]="employee.emmployeeAdress"
        />
        <mat-icon matSuffix>apartment</mat-icon>
      </mat-form-field>
      <mat-form-field id="sel">
        <mat-label>Choose your department</mat-label>
        <mat-select name="employeeDepartment" [(ngModel)]="employee.employeeDepartment">
          <mat-option value="IT">IT</mat-option>
          <mat-option value="Network">Network</mat-option>
          <mat-option value="Repair">Repair</mat-option>
        </mat-select>
      </mat-form-field>
      <div>
        <label>Gender</label>
        <mat-radio-group aria-label="Select an option">
          <mat-radio-button
            [checked]="employee.employeeGender == 'M'"
            (click)="selectGender('M')"
            value="M"
            >M</mat-radio-button
          >
          <mat-radio-button
            [checked]="employee.employeeGender == 'F'"
            (click)="selectGender('F')"
            value="F"
            >F</mat-radio-button
          >
        </mat-radio-group>
      </div>
      <mat-form-field appearance="outline" class="mt-2">
        <mat-label>Employee Skills</mat-label>
        <input
          matInput
          placeholder="Employee Skills"
          name="employeeSkills"
          [(ngModel)]="employee.employeeSkills"
          disabled
        />
        <mat-icon matSuffix>book</mat-icon>
      </mat-form-field>
      <div>
        <label>Skills</label>
        <section class="example-section">
          <mat-checkbox
            class="example-margin"
            (change)="onSkillsChanges($event)"
            value="Java"
            [checked]="checkSkills('Java')"
            >Java</mat-checkbox
          >
          <mat-checkbox
            class="example-margin"
            (change)="onSkillsChanges($event)"
            value="Angular"
            [checked]="checkSkills('Angular')"
            >Angular</mat-checkbox
          >
          <mat-checkbox
            class="example-margin"
            (change)="onSkillsChanges($event)"
            value="Spring Boot"
            [checked]="checkSkills('Spring Boot')"
            >Spring Boot</mat-checkbox
          >
          <mat-checkbox
            class="example-margin"
            (change)="onSkillsChanges($event)"
            value="AWS"
            [checked]="checkSkills('AWS')"
            >AWS</mat-checkbox
          >
        </section>
      </div>
      <mat-divider></mat-divider>
      <div class="text-center mt-3">
        <button mat-raised-button class="mt-2" type="reset">Clear</button>
        <button mat-raised-button id="kopce" class="mt-2" type="submit">Save</button>
      </div>
    </form>
  </div>
</div>
